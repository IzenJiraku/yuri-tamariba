<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>この場所について | 百合のたまりば</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500&display=swap');

*{ box-sizing:border-box; }

body{
  margin:0;
  background: #e0f2f7; 
  color:#2b2b2b;
  font-family: "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif;
  overflow-x: hidden;
  line-height: 1.8;
  min-height: 100vh;
}

/* 背景装飾 */
.bg-decor {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: -1; pointer-events: none;
}
.bg-circle {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 0%, transparent 70%);
  filter: blur(50px);
}

/* ===== TOPBAR ===== */
.topbar{
  position:fixed; top:0; left:0; width:100%;
  display:flex; align-items:center; justify-content:space-between;
  padding:15px 25px; background:rgba(255, 255, 255, 0.3);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255, 255, 255, 0.2); z-index:1000;
}
.back-btn {
  text-decoration: none; color: #4a6a7a; font-size: 14px; letter-spacing: 0.1em;
  display: flex; align-items: center; transition: 0.3s;
}
.back-btn:hover { opacity: 0.6; transform: translateX(-5px); }

.logo{ font-size:18px; letter-spacing:0.3em; font-weight: 500; color: #4a6a7a; text-shadow: 0 0 10px rgba(255,255,255,0.5); text-decoration: none; }

/* ===== LAYOUT ===== */
.container{ max-width:680px; margin:auto; padding:150px 24px 80px; animation: fadeIn 1.5s ease; }

.about-card {
  background: rgba(255, 255, 255, 0.4);
  backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.5);
  border-radius: 40px;
  padding: 50px 40px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.03);
  text-align: center;
}

.about-title {
  font-size: 22px; font-weight: 300; color: #3a5a6a; letter-spacing: 0.2em; margin-bottom: 25px;
}

.about-logo-container {
  margin-bottom: 35px;
  display: flex;
  justify-content: center;
  align-items: center;
}
.about-logo-img {
  height: 120px;
  width: auto;
  object-fit: contain;
  opacity: 0.85;
  pointer-events: none;
}

.about-text {
  font-size: 15px; color: #3b3b3b; text-align: left; max-width: 500px; margin: 0 auto 40px;
  letter-spacing: 0.05em;
}
.about-text p { margin-bottom: 24px; }

/* 耳打ち用リンクボタン */
.whisper-link {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 32px;
  background: rgba(255, 255, 255, 0.6);
  border: 1px solid rgba(74, 106, 122, 0.2);
  border-radius: 30px;
  color: #4a6a7a;
  text-decoration: none;
  font-size: 14px;
  letter-spacing: 0.05em;
  transition: all 0.4s ease;
  box-shadow: 0 4px 15px rgba(0,0,0,0.02);
}
.whisper-link:hover {
  background: rgba(74, 106, 122, 0.1);
  border-color: rgba(74, 106, 122, 0.4);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(74, 106, 122, 0.05);
}

/* ===== 「最近の更新」エリア（地続きのシンプルデザイン） ===== */
.updates-section {
  margin-top: 50px; /* 上のカードからの心地よい余白 */
  padding: 0 10px;
}
.updates-title {
  font-size: 16px;
  font-weight: 500;
  color: #3a5a6a;
  letter-spacing: 0.15em;
  margin-bottom: 20px;
  position: relative;
  display: inline-block;
}
.updates-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.updates-item {
  font-size: 14px;
  color: #4a4a4a;
  border-bottom: 1px dashed rgba(74, 106, 122, 0.15);
  padding-bottom: 8px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.update-date {
  font-size: 12px;
  color: #6a8a9a;
  white-space: nowrap;
  font-family: sans-serif;
  background: rgba(255, 255, 255, 0.5);
  padding: 1px 8px;
  border-radius: 4px;
}
.update-todo {
  word-break: break-all;
}
.updates-loading {
  font-size: 13px;
  color: #6a8a9a;
  letter-spacing: 0.1em;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 600px) {
  .about-card { padding: 40px 24px; border-radius: 30px; }
  .container { padding-top: 110px; }
  .logo { font-size: 15px; letter-spacing: 0.2em; }
  .about-text { font-size: 14px; }
  .about-logo-img { height: 100px; }
  .updates-section { margin-top: 40px; }
  .updates-item { font-size: 13px; gap: 8px; }
  .update-date { font-size: 11px; padding: 1px 6px; }
}
</style>
</head>

<body>

<div class="bg-decor">
  <div class="bg-circle" style="width: 60vw; height: 60vw; top: -20vw; right: -10vw;"></div>
  <div class="bg-circle" style="width: 40vw; height: 40vw; bottom: -10vw; left: -10vw; opacity: 0.6;"></div>
</div>

<div class="topbar">
  <a href="#" class="back-btn" onclick="history.back(); return false;">← 戻る</a>
  <a href="index.html" class="logo">百合のたまりば</a>
</div>

<div class="container">
  <div class="about-card">
    <h1 class="about-title">たまりばについて</h1>
    
    <div class="about-logo-container">
      <img src="logo.png" alt="百合のたまりば ロゴ" class="about-logo-img">
    </div>
    
    <div class="about-text">
      <p>世の中にある「女性同士の特別な関係性・感情が描かれている作品」を、その時々の気分に合わせて見つけられるように作った小さな記録庫（たまりば）です。</p>
      <p>今は管理人が好きな作品を収めている段階なので、まだまだ十分な作品数ではありません。<br>みなさまからの耳打ちで少しずつ育っていくサイトです。</p>
    </div>
    
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSdX4mou3VF1YV12yk7pMq7JWqekHbHNuhw7ufK0gxOhdJxo4Q/viewform?usp=header" target="_blank" class="whisper-link">
      <span>こちらから好きな作品をそっと耳打ちしてみませんか。</span>
    </a>
  </div>

  <div class="updates-section">
    <h2 class="updates-title">最近の更新</h2>
    <ul id="updatesList" class="updates-list">
      <li class="updates-loading">更新情報を読み込んでいます...</li>
    </ul>
  </div>
</div>

<script>
// ホームでの背景色（深さ）を引き継ぐ
const savedState = JSON.parse(localStorage.getItem('yuri_state'));
if (savedState && savedState.depth) {
  const val = savedState.depth;
  const r = 224 - (val - 1) * 12;
  const g = 242 - (val - 1) * 15;
  const b = 247 - (val - 1) * 10;
  document.body.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
}

// ===== 「やること」シートから完了データを取得するスクリプト =====
document.addEventListener("DOMContentLoaded", () => {
  const todoSheetUrl = "https://opensheet.elk.sh/1Q-FkmH9rDdKHDlqSwtX1ILOpWOdVRygT0HrTJyQjBGU/やること";
  const updatesList = document.getElementById("updatesList");

  fetch(todoSheetUrl)
    .then(r => r.json())
    .then(data => {
      // 進捗列が「完了」になっているデータのみを抽出
      const completedTasks = data.filter(item => item["進捗"] === "完了");

      if (!completedTasks || completedTasks.length === 0) {
        updatesList.innerHTML = '<li class="updates-loading">最近の更新情報はありません。</li>';
        return;
      }

      // 最新の5件をピックアップ（スプレッドシートの下部にあるものが新しいと想定）
      // もし最新順ではなくシートの並びのまま表示したい場合は .reverse() を消してください
      const latestUpdates = completedTasks.slice(-5).reverse();

      // HTMLを生成
      updatesList.innerHTML = latestUpdates.map(item => {
        const dateText = item["日付"] || "----/--/--";
        const todoText = item["ToDo"] || "";
        
        return `
          <li class="updates-item">
            <span class="update-date">${dateText}</span>
            <span class="update-todo">${todoText}</span>
          </li>
        `;
      }).join('');
    })
    .catch(e => {
      console.error(e);
      updatesList.innerHTML = '<li class="updates-loading">更新情報の読み込みに失敗しました。</li>';
    });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>作品一覧 | 百合のたまりば</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500&display=swap');

*{ box-sizing:border-box; }

body{
  margin:0;
  background: #e0f2f7; 
  color:#2b2b2b;
  font-family: "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 16px;
  overflow-x: hidden;
  line-height: 1.8;
  min-height: 100vh;
}

/* 背景装飾 */
.bg-decor {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: -1; pointer-events: none;
}
.bg-circle {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 0%, transparent 70%);
  filter: blur(50px);
}

/* ===== TOPBAR ===== */
.topbar{
  position:fixed; top:0; left:0; width:100%;
  display:flex; align-items:center; justify-content:space-between;
  padding:15px 25px; background:rgba(255, 255, 255, 0.3);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255, 255, 255, 0.2); z-index:1000;
}
.back-btn {
  text-decoration: none; color: #4a6a7a; font-size: 14px; letter-spacing: 0.1em;
  display: flex; align-items: center; transition: 0.3s;
}
.back-btn:hover { opacity: 0.6; transform: translateX(-5px); }

.logo{ font-size:18px; letter-spacing:0.3em; font-weight: 500; color: #4a6a7a; text-shadow: 0 0 10px rgba(255,255,255,0.5); text-decoration: none; }

/* ===== LAYOUT ===== */
.container{ max-width:800px; margin:auto; padding:140px 24px 80px; }
.page-title { font-size: 24px; font-weight: 300; text-align: center; color: #4a6a7a; letter-spacing: 0.2em; margin-bottom: 20px; }
#counter { text-align: center; font-size: 13px; color: #5a7a8a; margin-bottom: 25px; letter-spacing: 0.1em; }

/* ===== SORT SWITCH ===== */
.sort-switch {
  display: flex; justify-content: center; gap: 10px; margin-bottom: 40px;
}
.sort-btn {
  background: rgba(255, 255, 255, 0.4); border: 1px solid rgba(74, 106, 122, 0.2);
  padding: 6px 18px; border-radius: 20px; font-size: 13px; color: #5a7a8a;
  cursor: pointer; transition: all 0.3s ease; letter-spacing: 0.05em;
  font-family: inherit;
}
.sort-btn.active {
  background: rgba(74, 106, 122, 0.15); border-color: rgba(74, 106, 122, 0.4);
  color: #3a5a6a; font-weight: 500;
}

/* ===== COUNTRY BLOCK ===== */
.country-section { margin-bottom: 30px; animation: fadeInUp 1.5s ease backwards; }
.country-title {
  font-size: 18px; font-weight: 500; color: #3a5a6a; margin-bottom: 15px; padding-bottom: 5px;
  border-bottom: 1px dashed rgba(74, 106, 122, 0.3); letter-spacing: 0.1em;
  cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none;
}
.country-title:hover { opacity: 0.7; }
.country-title::after { content: '▼'; font-size: 12px; color: #5a7a8a; transition: transform 0.3s; }
.country-section.open .country-title::after { transform: rotate(180deg); }

/* ===== LIST ===== */
.results{ display:grid; gap:18px; }
.country-section .results { display: none; }
.country-section.open .results { display: grid; }

.movie{
  background: rgba(255, 255, 255, 0.45); border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 20px; padding:20px; display: flex; gap: 20px; align-items: center;
  transition: all 0.4s; text-decoration: none; color: inherit;
  backdrop-filter: blur(10px);
}
.movie:hover { transform: translateY(-3px); background: rgba(255, 255, 255, 0.6); box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
.movie-img{ width: 75px; height: 105px; flex-shrink: 0; border-radius: 10px; overflow: hidden; background: #f0f8fa; }
.movie-img img{ width: 100%; height: 100%; object-fit: cover; }
.movie-content { flex-grow: 1; min-width: 0; }
.movie-content h3 { margin: 4px 0 6px; font-size: 18px; font-weight: 500; color: #3a5a6a; line-height: 1.4; }
.movie-meta { font-size: 12px; color: #5a7a8a; opacity: 0.7; }

/* カード内タグ用の装飾 */
.movie-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.mini-tag { font-size: 11px; padding: 2px 10px; border-radius: 12px; letter-spacing: 0.05em; line-height: 1.4; }
.mini-tag.rel { background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(160, 216, 239, 0.5); color: #4a6a7a; }
.mini-tag.mood { background: rgba(245, 238, 230, 0.6); border: 1px solid rgba(139, 129, 117, 0.25); color: #7a6e60; }

#loading { text-align: center; padding: 100px; font-size: 14px; color: #4a6a7a; letter-spacing: 0.2em; }

@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 600px) {
  .logo { font-size: 15px; letter-spacing: 0.2em; }
}
</style>
</head>

<body>

<div class="bg-decor">
  <div class="bg-circle" style="width: 60vw; height: 60vw; top: -20vw; right: -10vw;"></div>
  <div class="bg-circle" style="width: 40vw; height: 40vw; bottom: -10vw; left: -10vw; opacity: 0.6;"></div>
</div>

<div class="topbar">
  <a href="#" class="back-btn" onclick="history.back(); return false;">← 戻る</a>
  <a href="index.html" class="logo">百合のたまりば</a>
</div>

<div class="container">
  <h1 class="page-title">作品一覧</h1>
  <div id="counter"></div>
  
  <div class="sort-switch">
    <button id="btnName" class="sort-btn active" onclick="changeSort('name')">50音</button>
    <button id="btnYear" class="sort-btn" onclick="changeSort('year')">国</button>
  </div>

  <div id="contentArea">
    <div id="loading">たまりばの記録を開いています...</div>
  </div>
</div>

<script>
const url = "https://opensheet.elk.sh/1Q-FkmH9rDdKHDlqSwtX1ILOpWOdVRygT0HrTJyQjBGU/百合作品リスト";
let allMovies = [];
let currentSort = localStorage.getItem('list_sort_type') || "name";

// 背景色の読み込み
const savedState = JSON.parse(localStorage.getItem('yuri_state'));
if (savedState && savedState.depth) {
  const val = savedState.depth;
  const r = 224 - (val - 1) * 12;
  const g = 242 - (val - 1) * 15;
  const b = 247 - (val - 1) * 10;
  document.body.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
}

// データ読み込み
fetch(url)
  .then(r => r.json())
  .then(data => {
    if (data && data.length > 0) {
      allMovies = data.filter(m =>
  String(m.公開).toLowerCase() === "true"
);
      document.getElementById('btnName').classList.toggle('active', currentSort === 'name');
      document.getElementById('btnYear').classList.toggle('active', currentSort === 'year');
      renderCountryGroupList();
    } else {
      document.getElementById('contentArea').innerHTML = '<div id="loading">登録されている作品がありません。</div>';
    }
  })
  .catch(e => {
    document.getElementById('contentArea').innerHTML = '<div id="loading">データの読み込みに失敗しました。</div>';
  });

function changeSort(type) {
  if (currentSort === type) return;
  currentSort = type;
  localStorage.setItem('list_sort_type', type);
  document.getElementById('btnName').classList.toggle('active', type === 'name');
  document.getElementById('btnYear').classList.toggle('active', type === 'year');
  renderCountryGroupList();
}

function getGyo(kanaStr) {
  if (!kanaStr) return "その他";

  const firstChar = kanaStr.trim().charAt(0);
  if (!firstChar) return "その他";

  // 英字はアルファベットごとに分類
  if (/[A-Za-z]/.test(firstChar)) {
    return firstChar.toUpperCase();
  }

  // カタカナ→ひらがな変換
  const hira = firstChar.replace(
    /[\u30a1-\u30f6]/g,
    c => String.fromCharCode(c.charCodeAt(0) - 0x60)
  );

  const groups = {
    "ア": ["あ","い","う","え","お","ぁ","ぃ","ぅ","ぇ","ぉ"],
    "カ": ["か","き","く","け","こ","が","ぎ","ぐ","げ","ご"],
    "サ": ["さ","し","す","せ","そ","ざ","じ","ず","ぜ","ぞ"],
    "タ": ["た","ち","つ","て","と","だ","ぢ","づ","で","ど"],
    "ナ": ["な","に","ぬ","ね","の"],
    "ハ": ["は","ひ","ふ","へ","ほ","ば","び","ぶ","べ","ぼ","ぱ","ぴ","ぷ","ぺ","ぽ"],
    "マ": ["ま","み","む","め","も"],
    "ヤ": ["や","ゆ","よ","ゃ","ゅ","ょ"],
    "ラ": ["ら","り","る","れ","ろ"],
    "ワ": ["わ","を","ん","ゔ"]
  };

  for (const [gyo, chars] of Object.entries(groups)) {
    if (chars.includes(hira)) {
      return gyo;
    }
  }

  return "その他";
}
function toggleSection(element) {
  const section = element.parentElement;
  section.classList.toggle('open');
}

function renderCountryGroupList() {
  document.getElementById('counter').innerText = `全 ${allMovies.length} 作品`;
  const area = document.getElementById('contentArea');
  
  let groups = {};
  let groupOrder = [];

  if (currentSort === "name") {
    // 50音の基本定義
    groupOrder = ["ア", "カ", "サ", "タ", "ナ", "ハ", "マ", "ヤ", "ラ", "ワ"];
    
    allMovies.forEach(m => {
      // 新設した「Kana」列のデータを最優先で評価
      const searchKey = m.Kana || "";
      const gyo = getGyo(searchKey);
      if (!groups[gyo]) groups[gyo] = [];
      groups[gyo].push(m);
    });

    // アルファベットなどの定義外グループ
    let extraGroups = [];
    Object.keys(groups).forEach(g => {
      if (!groupOrder.includes(g) && g !== "その他") {
        extraGroups.push(g);
      }
    });
    extraGroups.sort((a, b) => a.localeCompare(b, 'en'));
    groupOrder = groupOrder.concat(extraGroups);

    if (groups["その他"]) {
      groupOrder.push("その他");
    }

  } else if (currentSort === "year") {
    // 国別グループ化
    groupOrder = ["日本", "韓国", "タイ", "台湾", "中国", "アメリカ", "フランス", "イタリア"];
    
    allMovies.forEach(m => {
      const country = m.Country || "その他";
      if (!groups[country]) groups[country] = [];
      groups[country].push(m);
    });

    let extraCountries = [];
    Object.keys(groups).forEach(g => {
      if (!groupOrder.includes(g) && g !== "その他") {
        extraCountries.push(g);
      }
    });
    groupOrder = groupOrder.concat(extraCountries);

    if (groups["Contrast"] || groups["その他"]) {
      groupOrder.push("その他");
    }
  }

  let html = "";
  groupOrder.forEach(groupName => {
    const list = groups[groupName];
    if (!list || list.length === 0) return;

    // 各グループ内での最終ソート
    if (currentSort === "name") {
      list.sort((a, b) => {
        const titleA = a.Kana || a.Title || "";
        const titleB = b.Kana || b.Title || "";
        return titleA.localeCompare(titleB, 'ja');
      });
    } else if (currentSort === "year") {
      list.sort((a, b) => {
        const yearA = a.Year ? parseInt(a.Year) : 9999;
        const yearB = b.Year ? parseInt(b.Year) : 9999;
        return yearA - yearB;
      });
    }
    
    html += `
      <div class="country-section">
        <h2 class="country-title" onclick="toggleSection(this)">${groupName} (${list.length})</h2>
        <div class="results">
          ${list.map(m => {
            let tagsHtml = "";
            
            if (m.Relationship) {
              m.Relationship.split(/[,、]/).forEach(r => {
                if(r.trim()) tagsHtml += `<span class="mini-tag rel">${r.trim()}</span>`;
              });
            }
            
            if (m.Mood) {
              m.Mood.split(/[,、]/).forEach(mood => {
                if(mood.trim()) tagsHtml += `<span class="mini-tag mood">${mood.trim()}</span>`;
              });
            }

            return `
              <a class="movie" href="detail.html?title=${encodeURIComponent(m.Title)}">
                <div class="movie-img">
                  <img src="${m.Image || ''}" onerror="this.style.opacity='0'">
                </div>
                <div class="movie-content">
                  <div class="movie-meta">${m.Year || '----'} / ${m.Format || '---'} ${m.Country ? ' / ' + m.Country : ''}</div>
                  <h3>${m.Title}</h3>
                  <div class="movie-tags">
                    ${tagsHtml}
                  </div>
                </div>
              </a>
            `;
          }).join("")}
        </div>
      </div>
    `;
  });
  
  area.innerHTML = html;
  restoreScrollPosition();
}

window.addEventListener('beforeunload', () => {
  localStorage.setItem('list_scroll_pos', window.scrollY);
});

function restoreScrollPosition() {
  const savedPosition = localStorage.getItem('list_scroll_pos');
  if (savedPosition) {
    setTimeout(() => {
      window.scrollTo(0, parseInt(savedPosition, 10));
      localStorage.removeItem('list_scroll_pos');
    }, 100);
  }
}
</script>

</body>
</html>

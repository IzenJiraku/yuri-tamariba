<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>百合のたまりば</title>

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  background: #e0f2f7; 
  color:#2b2b2b;
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  overflow-x: hidden;
  line-height: 1.6;
  transition: background-color 1.5s ease;
}

/* 背景の装飾 */
body::before {
  content: ""; position: fixed; top: -10%; left: -10%; width: 70%; height: 70%;
  background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 0%, transparent 70%);
  z-index: -1; filter: blur(60px); pointer-events: none;
}

/* ===== TOPBAR ===== */
.topbar{
  position:fixed; top:0; left:0; width:100%;
  display:flex; justify-content:space-between; align-items:center;
  padding:15px 22px; background:rgba(255, 255, 255, 0.6);
  backdrop-filter:blur(15px); border-bottom:1px solid rgba(255, 255, 255, 0.3); z-index:1000;
}
.logo{ font-size:14px; letter-spacing:0.25em; font-weight: 500; color: #4a6a7a; }
.menu-btn{
  width: 40px; height: 40px; background: rgba(255, 255, 255, 0.8);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer; transition: 0.4s;
  border: 1px solid rgba(255,255,255,0.8); color: #4a6a7a;
}

/* ===== LAYOUT ===== */
.container{ max-width:760px; margin:auto; padding:120px 20px 120px; }
.hero { text-align: center; margin-bottom: 40px; }
.hero h1{ font-size:28px; font-weight:400; margin:0 0 20px 0; letter-spacing: 0.2em; color: #4a6a7a; }
.hero-main-text { font-size: 15px; color: #3a5a6a; }

.section{ margin-top:60px; }
.section-title{ font-size:14px; margin-bottom:12px; color: #5a7a8a; text-align: center; letter-spacing: 0.1em; }
.section-sub { font-size: 10px; color: #8b8175; text-align: center; margin-bottom: 20px; display: block; }

/* ===== GRID & CARDS ===== */
.grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
@media (max-width:600px){ .grid{ grid-template-columns:repeat(3,1fr); } }
@media (max-width:400px){ .grid{ grid-template-columns:repeat(2,1fr); } }

.card{
  aspect-ratio:1/1; background: rgba(255, 255, 255, 0.5);
  border: 1px solid rgba(255, 255, 255, 0.8);
  border-radius: 50% 50% 48% 52% / 52% 48% 52% 48%; 
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all 0.3s;
  text-align:center; padding:10px; font-size: 13px; color: #5a7a8a;
}
.card.active{ background: #c7e9f5; border-color: #a0d8ef; color: #3a5a6a; transform: scale(1.05); }

/* ===== SLIDER (潜水深度) ===== */
.slider-wrapper { max-width: 400px; margin: 0 auto; text-align: center; }
input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; cursor: pointer; }
input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: rgba(74, 106, 122, 0.15); border-radius: 2px; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #fff; border: 1px solid #a0d8ef; margin-top: -10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
#depthLabel { font-size: 13px; margin-top: 15px; letter-spacing: 0.1em; color: #4a6a7a; font-weight: 500; }

/* ===== RESULTS ===== */
.results{ display:grid; gap:16px; margin-top: 30px; }
.movie{
  background: rgba(255, 255, 255, 0.6); border: 1px solid rgba(255, 255, 255, 0.4);
  border-radius: 20px 40px 30px 50px / 50% 50% 50% 50%;
  padding:20px; display: flex; gap: 20px; align-items: center;
  transition: 0.3s; text-decoration: none; color: inherit;
}
.movie-img{ width: 70px; height: 95px; flex-shrink: 0; border-radius: 10px; overflow: hidden; background: #f0f8fa; }
.movie-img img{ width: 100%; height: 100%; object-fit: cover; }
.movie-content h3 { margin: 4px 0 0; font-size: 16px; font-weight: 500; }

/* ===== MENU & SEARCH ===== */
.menu{ position:fixed; top:0; left:-320px; width:320px; height:100vh; background:rgba(255, 255, 255, 0.98); padding:100px 24px 60px; transition:.4s; z-index:2000; overflow-y: auto; color: #2b2b2b !important; }
.menu.open{ left:0; }
.search{ width:100%; padding:14px; border-radius:15px; border:1px solid #d0e8f0; outline: none; font-size: 14px; }
.no-result-box { padding: 20px 0; font-size: 12px; color: #8b8175; line-height: 1.8; }
.form-link { color: #4a6a7a; text-decoration: underline; }

.overlay{ position:fixed; inset:0; background:rgba(0, 0, 0, 0.1); opacity:0; pointer-events:none; transition:.3s; z-index:1500; backdrop-filter: blur(2px); }
.overlay.show{ opacity:1; pointer-events:auto; }
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="topbar">
  <div class="logo">百合のたまりば</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<div class="menu" id="menu">
  <input class="search" type="text" placeholder="作品名を探す" oninput="searchMovie(this.value)">
  <div id="searchResults"></div>
  <a href="list.html" style="display:block; margin-top:30px; text-decoration:none; color:#4a6a7a; font-size:14px; text-align:center;">作品一覧を見る</a>
</div>

<div class="container">
  <div class="hero">
    <h1>百合のたまりば</h1>
    <div class="hero-main-text">あなたの今の心地に、そっと寄り添う一作を。</div>
  </div>

  <div class="section">
    <div class="section-title">どこの国の空気に触れたい？</div>
    <div class="grid" id="countryGrid">
      <div class="card" data-value="日本" onclick="selectCountry('日本',this)">日本</div>
      <div class="card" data-value="韓国" onclick="selectCountry('韓国',this)">韓国</div>
      <div class="card" data-value="タイ" onclick="selectCountry('タイ',this)">タイ</div>
      <div class="card" data-value="台湾" onclick="selectCountry('台湾',this)">台湾</div>
      <div class="card" data-value="中国" onclick="selectCountry('中国',this)">中国</div>
      <div class="card" data-value="アメリカ" onclick="selectCountry('アメリカ',this)">アメリカ</div>
      <div class="card" data-value="フランス" onclick="selectCountry('フランス',this)">フランス</div>
      <div class="card" data-value="イタリア" onclick="selectCountry('イタリア',this)">イタリア</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">なにで物語を楽しむ？</div>
    <span class="section-sub">複数選択できます</span>
    <div class="grid" id="formatGrid">
      <div class="card" data-value="映画" onclick="toggleFilter('format','映画',this)">映画</div>
      <div class="card" data-value="ドラマ" onclick="toggleFilter('format','ドラマ',this)">ドラマ</div>
      <div class="card" data-value="アニメ" onclick="toggleFilter('format','アニメ',this)">アニメ</div>
      <div class="card" data-value="漫画" onclick="toggleFilter('format','漫画',this)">漫画</div>
      <div class="card" data-value="小説" onclick="toggleFilter('format','小説',this)">小説</div>
      <div class="card" data-value="ゲーム" onclick="toggleFilter('format','ゲーム',this)">ゲーム</div>
      <div class="card" data-value="MV" onclick="toggleFilter('format','MV',this)">MV</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">関係性の好みは？</div>
    <span class="section-sub">複数選択できます</span>
    <div class="grid" id="relGrid">
      <div class="card" data-value="恋愛" onclick="toggleFilter('rel','恋愛',this)">恋愛</div>
      <div class="card" data-value="片思い" onclick="toggleFilter('rel','片思い',this)">片思い</div>
      <div class="card" data-value="友愛" onclick="toggleFilter('rel','友愛',this)">友愛</div>
      <div class="card" data-value="姉妹" onclick="toggleFilter('rel','姉妹',this)">姉妹</div>
      <div class="card" data-value="先輩と後輩" onclick="toggleFilter('rel','先輩と後輩',this)">先輩と後輩</div>
      <div class="card" data-value="先生と生徒" onclick="toggleFilter('rel','先生と生徒',this)">先生と生徒</div>
      <div class="card" data-value="幼馴染" onclick="toggleFilter('rel','幼馴染',this)">幼馴染</div>
      <div class="card" data-value="ライバル" onclick="toggleFilter('rel','ライバル',this)">ライバル</div>
      <div class="card" data-value="罪の共有" onclick="toggleFilter('rel','罪の共有',this)">罪の共有</div>
      <div class="card" data-value="復讐" onclick="toggleFilter('rel','復讐',this)">復讐</div>
      <div class="card" data-value="主従" onclick="toggleFilter('rel','主従',this)">主従</div>
    </div>
  </div>

  <div class="section">
    <div class="slider-wrapper">
      <div class="section-title">どれくらいまで潜りますか？</div>
      <input type="range" id="depthSlider" min="1" max="5" value="1" oninput="updateDepth(this.value)">
      <div id="depthLabel">ピュア</div>
    </div>
  </div>

  <div class="section" id="resultsSection" style="display:none;">
    <div class="section-title">たまりばの作品たち</div>
    <div class="results" id="results"></div>
  </div>
</div>

<script>
const url = "https://opensheet.elk.sh/1Q-FkmH9rDdKHDlqSwtX1ILOpWOdVRygT0HrTJyQjBGU/百合作品リスト";
let movies = [];

const moodDepthMap = { "ピュアな": 1, "リアルな": 2, "アダルトな": 3, "ウェットな": 4, "ヘビーな": 5 };

let state = { country: "", format: [], rel: [], depth: 1 };

fetch(url).then(r => r.json()).then(d => {
  movies = d;
  updateDepth(1, false);
  render();
});

function updateDepth(val, shouldRender = true) {
  state.depth = parseInt(val);
  const labels = ["ピュア", "リアル", "アダルト", "ウェット", "ヘビー"];
  document.getElementById("depthLabel").innerText = labels[val - 1];
  
  const r = 224 - (val - 1) * 15;
  const g = 242 - (val - 1) * 20;
  const b = 247 - (val - 1) * 12;
  document.body.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;

  if(shouldRender) render();
}

function selectCountry(val, el){
  state.country = (state.country === val) ? "" : val;
  document.querySelectorAll("#countryGrid .card").forEach(c => c.classList.remove("active"));
  if(state.country) el.classList.add("active");
  render();
}

function toggleFilter(type, val, el){
  if(state[type].includes(val)) state[type] = state[type].filter(x => x !== val);
  else state[type].push(val);
  el.classList.toggle("active");
  render();
}

function getFilteredMovies(){
  // 何も選択されていないかチェック (depthは初期値1なので除外)
  if (!state.country && state.format.length === 0 && state.rel.length === 0) {
    return null; // 何も表示しないフラグ
  }

  return movies.filter(m => {
    const okC = !state.country || m.Country === state.country;
    const okF = state.format.length === 0 || state.format.some(v => (m.Format || "").includes(v));
    const okR = state.rel.length === 0 || state.rel.some(v => (m.Relationship || "").includes(v));
    
    const movieMoods = (m.Mood || "").split(/[,、]/).filter(Boolean);
    const movieDepths = movieMoods.map(mood => moodDepthMap[mood.trim()] || 1);
    const movieMaxDepth = movieDepths.length > 0 ? Math.max(...movieDepths) : 1;
    const okD = movieMaxDepth <= state.depth;

    return okC && okF && okR && okD;
  });
}

function render(){
  const list = getFilteredMovies();
  const resultsSection = document.getElementById("resultsSection");
  const area = document.getElementById("results");
  
  // 何も選択されていない場合はセクションごと隠す
  if (list === null) {
    resultsSection.style.display = "none";
    return;
  }

  resultsSection.style.display = "block";

  if(list.length === 0) {
    area.innerHTML = `<div style="text-align:center; padding:60px 20px; font-size:13px; color:#8b8175;">この深さには、まだ作品が届いていないようです。</div>`;
    return;
  }

  area.innerHTML = list.map(m => `
    <a class="movie" href="detail.html?title=${encodeURIComponent(m.Title)}">
      <div class="movie-img"><img src="${m.Image || ''}" onerror="this.style.display='none'"></div>
      <div class="movie-content">
        <div style="font-size:10px; opacity:0.7;">${m.Country} / ${m.Format}</div>
        <h3 style="color: inherit; margin-top:2px;">${m.Title}</h3>
      </div>
    </a>`).join("");
}

function toggleMenu(){ 
  document.getElementById("menu").classList.toggle("open"); 
  document.getElementById("overlay").classList.toggle("show"); 
}

function searchMovie(keyword){
  const area = document.getElementById("searchResults");
  if(!keyword) { area.innerHTML = ""; return; }
  const filtered = movies.filter(m => (m.Title || "").includes(keyword));
  if(filtered.length === 0){
    area.innerHTML = `
      <div class="no-result-box">
        その作品は、まだたまりばに届いていないようです。<br>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSdX4mou3VF1YV12yk7pMq7JWqekHbHNuhw7ufK0gxOhdJxo4Q/viewform?usp=sf_link" target="_blank" class="form-link">こちらから、耳打ちしてみませんか。</a>
      </div>`;
    return;
  }
  area.innerHTML = filtered.map(m => `<div style="padding:14px; border-bottom:1px solid #f0f8fa; cursor:pointer; font-size:14px;" onclick="location.href='detail.html?title=${encodeURIComponent(m.Title)}'">${m.Title}</div>`).join("");
}
</script>

</body>
</html>

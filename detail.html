<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>作品詳細 | 百合のたまりば</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500&display=swap');

*{ box-sizing:border-box; }

body{
  margin:0;
  background: #e0f2f7; 
  color:#2b2b2b;
  font-family: "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif;
  overflow-x: hidden;
  line-height: 1.8;
  min-height: 100vh;
}

/* 背景装飾 */
.bg-decor {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: -1; pointer-events: none;
}
.bg-circle {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 0%, transparent 70%);
  filter: blur(50px);
}

/* ===== TOPBAR ===== */
.topbar{
  position:fixed; top:0; left:0; width:100%;
  display:flex; align-items:center; justify-content:space-between;
  padding:15px 25px; background:rgba(255, 255, 255, 0.3);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255, 255, 255, 0.2); z-index:1000;
}
.back-btn {
  text-decoration: none; color: #4a6a7a; font-size: 14px; letter-spacing: 0.1em;
  display: flex; align-items: center; transition: 0.3s;
}
.back-btn:hover { opacity: 0.6; transform: translateX(-5px); }

.logo{ font-size:18px; letter-spacing:0.3em; font-weight: 500; color: #4a6a7a; text-shadow: 0 0 10px rgba(255,255,255,0.5); text-decoration: none; }

/* ===== LAYOUT ===== */
.container{ max-width:800px; margin:auto; padding:140px 20px 80px; animation: fadeIn 1.5s ease; }

.detail-card {
  background: rgba(255, 255, 255, 0.4);
  backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 255, 255, 0.5);
  border-radius: 40px;
  padding: 40px;
  display: flex; gap: 40px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.03);
}

@media (max-width: 600px) {
  .detail-card { flex-direction: column; padding: 30px; gap: 30px; border-radius: 30px; }
  .container { padding-top: 100px; }
  .visual-side { width: 180px; margin: 0 auto; }
  .logo { font-size: 15px; letter-spacing: 0.2em; }
  .action-group { flex-direction: column; align-items: stretch !important; gap: 12px; }
  .external-link, .bookshelf-btn { text-align: center; justify-content: center; }
}

.visual-side { width: 240px; flex-shrink: 0; }
.visual-side img {
  width: 100%; border-radius: 20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.1);
  background: #fff;
}

.info-side { flex-grow: 1; }
.meta-info { font-size: 13px; color: #5a7a8a; letter-spacing: 0.05em; margin-bottom: 10px; display: flex; gap: 15px; }
.title { font-size: 28px; font-weight: 500; margin: 0 0 20px 0; color: #3a5a6a; line-height: 1.3; }
.tag-box { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; }
.tag {
  font-size: 11px; padding: 4px 12px; background: rgba(255,255,255,0.5);
  border-radius: 20px; border: 1px solid rgba(255,255,255,0.8); color: #5a7a8a;
}

.description { font-size: 15px; color: #444; white-space: pre-wrap; margin-bottom: 35px; line-height: 2; }

/* ===== BUTTONS ===== */
.action-group {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  align-items: center;
}

/* 外部リンクボタン */
.external-link {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 12px 26px;
  background: rgba(74, 106, 122, 0.08);
  border: 1px solid rgba(74, 106, 122, 0.15);
  border-radius: 30px;
  color: #4a6a7a;
  text-decoration: none;
  font-size: 13px;
  letter-spacing: 0.03em;
  transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
}
.external-link:hover {
  background: rgba(74, 106, 122, 0.18);
  border-color: rgba(74, 106, 122, 0.3);
  transform: translateY(-2px);
}
.external-link svg { width: 14px; height: 14px; }

/* 本棚ボタン（通常時） */
.bookshelf-btn {
  display: inline-flex;
  align-items: center;
  padding: 12px 26px;
  background: rgba(255, 255, 255, 0.25);
  border: 1px solid rgba(74, 106, 122, 0.2);
  border-radius: 30px;
  color: #5a7a8a;
  font-family: inherit;
  font-size: 13px;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
  outline: none;
  position: relative;
  overflow: hidden;
}

.bookshelf-btn:hover {
  background: rgba(255, 255, 255, 0.6);
  border-color: rgba(121, 197, 228, 0.6);
  color: #3a5a6a;
  transform: translateY(-2px);
  letter-spacing: 0.14em;
  box-shadow: 0 10px 20px rgba(121, 197, 228, 0.15);
}

/* 本棚ボタン（格納済み） */
.bookshelf-btn.in-bookshelf {
  background: linear-gradient(135deg, rgba(121, 197, 228, 0.15), rgba(255, 255, 255, 0.4));
  border-color: transparent;
  color: #4a6a7a;
  font-weight: 500;
  letter-spacing: 0.05em;
  box-shadow: inset 0 1px 3px rgba(255,255,255,0.5);
}

.bookshelf-btn.in-bookshelf:hover {
  background: linear-gradient(135deg, rgba(121, 197, 228, 0.25), rgba(255, 255, 255, 0.5));
  transform: translateY(-1px);
  letter-spacing: 0.08em;
  box-shadow: 0 5px 15px rgba(121, 197, 228, 0.1);
}

#loading { text-align: center; padding: 100px; font-size: 14px; color: #4a6a7a; letter-spacing: 0.2em; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

<body>

<div class="bg-decor">
  <div class="bg-circle" style="width: 60vw; height: 60vw; top: -20vw; right: -10vw;"></div>
  <div class="bg-circle" style="width: 40vw; height: 40vw; bottom: -10vw; left: -10vw; opacity: 0.6;"></div>
</div>

<div class="topbar">
  <a href="#" class="back-btn" onclick="history.back(); return false;">← 戻る</a>
  <a href="index.html" class="logo">百合のたまりば</a>
</div>

<div class="container" id="contentArea">
  <div id="loading">たまりばに潜っています...</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const targetTitle = params.get('title');
const url = "https://opensheet.elk.sh/1Q-FkmH9rDdKHDlqSwtX1ILOpWOdVRygT0HrTJyQjBGU/百合作品リスト";

const savedState = JSON.parse(localStorage.getItem('yuri_state'));

if (!targetTitle) {
  document.getElementById('contentArea').innerHTML = '<div id="loading">作品が見つかりませんでした。</div>';
} else {
  fetch(url)
    .then(r => r.json())
    .then(data => {
      const item = data.find(m => m.Title === targetTitle);
      if (item) {
        renderDetail(item);
      } else {
        document.getElementById('contentArea').innerHTML = '<div id="loading">作品の詳細がまだ届いてないみたい。</div>';
      }
    })
    .catch(e => {
      document.getElementById('contentArea').innerHTML = '<div id="loading">データの読み込みに失敗しました。</div>';
    });
}

function renderDetail(m) {
  const moodDepthMap = { "ピュアな": 1, "リアルな": 2, "アダルトな": 3, "ウェットな": 4, "ヘビーな": 5 };
  const movieMoods = (m.Mood || "").split(/[,、]/).filter(Boolean);
  
  const maxD = movieMoods.length > 0 ? Math.max(...movieMoods.map(mood => moodDepthMap[mood.trim()] || 1)) : 1;
  
  const r = 224 - (maxD - 1) * 12;
  const g = 242 - (maxD - 1) * 15;
  const b = 247 - (maxD - 1) * 10;
  document.body.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;

  const area = document.getElementById('contentArea');
  
  // 関係性のタグ生成処理
  const relationshipTags = (m.Relationship || "").split(/[,、]/).filter(Boolean).map(t => `<span class="tag">${t.trim()}</span>`).join('');
  // 雰囲気のタグ生成処理
  const moodTags = movieMoods.map(t => `<span class="tag">#${t.trim()}</span>`).join('');

  area.innerHTML = `
    <div class="detail-card">
      <div class="visual-side">
        <img src="${m.Image || ''}" alt="${m.Title}" onerror="this.src='https://placehold.jp/24/d0e8f0/4a6a7a/240x320.png?text=No+Image'">
      </div>
      <div class="info-side">
        <div class="meta-info">
          <span>${m.Year || '----'}</span>
          <span>${m.Country || '---'}</span>
          <span>${m.Format || '---'}</span>
        </div>
        <h1 class="title">${m.Title}</h1>
        
        <div class="tag-box">
          ${relationshipTags}
          ${moodTags}
        </div>

        <div class="description">${m.Comment || 'まだコメントが流れ着いていないみたい。'}</div>
        
        <div class="action-group">
          ${m.Link ? `
            <a href="${m.Link}" target="_blank" class="external-link">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
              作品の詳細情報をのぞいてみる
            </a>
          ` : ''}

          <button type="button" id="bookshelfBtn" class="bookshelf-btn" onclick="toggleBookshelf('${encodeURIComponent(m.Title)}')">
            <span class="btn-text">＜本棚に置く＞</span>
          </button>
        </div>
      </div>
    </div>
  `;

  // ページ読み込み時にすでに本棚に入っているか確認して見た目を変更
  checkBookshelfState(m.Title);
}

// 本棚のデータ状態を確認してボタンの表示を切り替え
function checkBookshelfState(title) {
  const btn = document.getElementById('bookshelfBtn');
  if (!btn) return;

  let bookshelf = JSON.parse(localStorage.getItem('yuri_bookshelf')) || [];

  if (bookshelf.includes(title)) {
    btn.classList.add('in-bookshelf');
    btn.querySelector('.btn-text').innerText = '本棚に置いています';
  } else {
    btn.classList.remove('in-bookshelf');
    btn.querySelector('.btn-text').innerText = '本棚に置く';
  }
}

// ボタンが押されたときに保存・削除を切り替え
function toggleBookshelf(encodedTitle) {
  const title = decodeURIComponent(encodedTitle);
  let bookshelf = JSON.parse(localStorage.getItem('yuri_bookshelf')) || [];

  if (bookshelf.includes(title)) {
    bookshelf = bookshelf.filter(t => t !== title);
  } else {
    bookshelf.push(title);
  }

  localStorage.setItem('yuri_bookshelf', JSON.stringify(bookshelf));
  checkBookshelfState(title);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>百合のたまりば</title>

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  background: #e0f2f7; 
  color:#2b2b2b;
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  overflow-x: hidden;
  line-height: 1.6;
}

/* 背景の装飾 */
body::before {
  content: "";
  position: fixed;
  top: -10%; left: -10%; width: 70%; height: 70%;
  background: radial-gradient(circle, rgba(255, 255, 255, 0.6) 0%, transparent 70%);
  z-index: -1; filter: blur(60px); pointer-events: none;
}

/* ===== TOPBAR ===== */
.topbar{
  position:fixed; top:0; left:0; width:100%;
  display:flex; justify-content:space-between; align-items:center;
  padding:15px 22px; background:rgba(255, 255, 255, 0.4);
  backdrop-filter:blur(15px); border-bottom:1px solid rgba(255, 255, 255, 0.5); z-index:1000;
}

.logo{ font-size:14px; letter-spacing:0.25em; font-weight: 500; color: #4a6a7a; }

.menu-btn{
  width: 40px; height: 40px; background: rgba(255, 255, 255, 0.8);
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer; transition: 0.4s;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.8);
}

.menu-btn:hover { border-radius: 40% 60% 40% 60% / 60% 40% 60% 40%; background: #fff; }

/* ===== LAYOUT ===== */
.container{ max-width:760px; margin:auto; padding:120px 20px 120px; }
.hero h1{ font-size:28px; font-weight:400; margin:0; letter-spacing: 0.2em; text-align: center; color: #4a6a7a; }

.section{ margin-top:60px; }
.section-title{ font-size:14px; margin-bottom:24px; color: #5a7a8a; text-align: center; letter-spacing: 0.1em; }

/* ===== GRID & CARDS ===== */
.grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:15px; }
@media (max-width:480px){ .grid{ grid-template-columns:repeat(2,1fr); } }

.card{
  aspect-ratio:1/1; background: rgba(255, 255, 255, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.8);
  border-radius: 50% 50% 48% 52% / 52% 48% 52% 48%; 
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  text-align:center; padding:10px; font-size: 13px; color: #5a7a8a;
  box-shadow: 0 4px 15px rgba(0,0,0,0.02);
}

.card:hover{ background:rgba(255,255,255,0.9); transform: translateY(-3px); }

.card.active{
  background: #ffffff; border-color: #a0d8ef; color: #3a5a6a;
  box-shadow: 0 0 0 0px rgba(160, 216, 239, 0.5);
  animation: ripple 2.5s infinite;
}

@keyframes ripple {
  0% { box-shadow: 0 0 0 0px rgba(160, 216, 239, 0.4); }
  100% { box-shadow: 0 0 0 12px rgba(160, 216, 239, 0); }
}

/* ===== RESULTS ===== */
.results-head{ display:flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom:30px; }
.tag{ background:rgba(255,255,255,0.9); border:1px solid rgba(160, 216, 239, 0.3); padding:4px 12px; border-radius:999px; font-size:11px; color: #5a7a8a; margin: 2px; }

.results{ display:grid; gap:16px; }

.movie{
  background: rgba(255, 255, 255, 0.7); border: 1px solid rgba(255, 255, 255, 0.5);
  border-radius: 20px 40px 30px 50px / 50% 50% 50% 50%;
  padding:20px; display: flex; gap: 20px; align-items: center;
  transition: 0.4s ease; backdrop-filter: blur(5px); text-decoration: none; color: inherit;
}

.movie:hover{ background: #fff; transform: scale(1.01); border-radius: 40px 20px 50px 30px / 50% 50% 50% 50%; }

.movie-img{ width: 70px; height: 95px; flex-shrink: 0; border-radius: 10px; overflow: hidden; background: #f0f8fa; }
.movie-img img{ width: 100%; height: 100%; object-fit: cover; }
.movie-content h3 { margin: 4px 0 0; font-size: 16px; font-weight: 500; color: #3a5a6a; }
.movie-content .meta { font-size: 11px; color: #8b8175; }

/* ===== MENU & SEARCH ===== */
.menu{
  position:fixed; top:0; left:-320px; width:320px; height:100vh;
  background:rgba(255, 255, 255, 0.98); padding:100px 24px 60px;
  transition:.4s cubic-bezier(0.4, 0, 0.2, 1); z-index:2000; overflow-y: auto;
}
.menu.open{ left:0; }
.menu::-webkit-scrollbar { width: 4px; }
.menu::-webkit-scrollbar-thumb { background: #d0e8f0; border-radius: 10px; }

.search{ width:100%; padding:14px; border-radius:15px; border:1px solid #d0e8f0; outline: none; font-size: 14px; font-family: inherit; }

.no-result-box { padding: 20px 0; font-size: 12px; color: #8b8175; line-height: 1.8; }
.form-link { color: #4a6a7a; text-decoration: none; border-bottom: 1px solid #a0d8ef; }

.today-btn{ width:100%; border:none; background:#a0d8ef; color:white; padding:15px; border-radius:25px; cursor:pointer; margin-top: 30px; font-size: 14px; font-family: inherit; transition: 0.3s; }
.today-btn:hover { background: #8ecbe6; }

.overlay{ position:fixed; inset:0; background:rgba(74, 106, 122, 0.15); opacity:0; pointer-events:none; transition:.3s; z-index:1500; backdrop-filter: blur(2px); }
.overlay.show{ opacity:1; pointer-events:auto; }

.empty-state{ padding: 60px 20px; text-align: center; font-size: 13px; color: #8b8175; }
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="topbar">
  <div class="logo">百合のたまりば</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<div class="menu" id="menu">
  <input class="search" type="text" placeholder="作品名を探す" oninput="searchMovie(this.value)">
  <div class="search-results" id="searchResults"></div>
  <a href="list.html" style="display:block; margin-top:30px; text-decoration:none; color:#4a6a7a; font-size:14px; text-align:center;">作品一覧を見る</a>
  <button class="today-btn" onclick="recommendToday()">今日の一本をひく</button>
  <p style="font-size:10px; color:#8b8175; margin-top: 10px; text-align: center;">今の気分から、そっと一作えらびます。</p>
</div>

<div class="container">
  <div class="hero">
    <div class="hero">
  <h1>百合のたまりば</h1>
  <div class="hero-description">
    <p class="main-text">今の気分や好みの関係性を選んで、<br class="sp-only">あなたにぴったりの一作を見つける場所です。</p>
    <p class="sub-text">下のカードをタップすると、作品が絞り込まれます。</p>
  </div>
</div>

  <!-- 国別 -->
  <div class="section">
    <div class="section-title">どこの国の空気に触れたい？</div>
    <div class="grid" id="countryGrid">
      <div class="card" onclick="selectCountry('日本',this)">日本</div>
      <div class="card" onclick="selectCountry('韓国',this)">韓国</div>
      <div class="card" onclick="selectCountry('タイ',this)">タイ</div>
      <div class="card" onclick="selectCountry('台湾',this)">台湾</div>
      <div class="card" onclick="selectCountry('中国',this)">中国</div>
    </div>
  </div>

  <!-- Mood -->
  <div class="section">
    <div class="section-title">どんな気持ちで見たい？</div>
    <div class="grid" id="moodGrid">
      <div class="card" onclick="selectMood('ピュアな',this)">ピュアな</div>
      <div class="card" onclick="selectMood('アダルトな',this)">アダルトな</div>
      <div class="card" onclick="selectMood('リアルな',this)">リアルな</div>
      <div class="card" onclick="selectMood('ディープな',this)">ディープな</div>
      <div class="card" onclick="selectMood('ウェットな',this)">ウェットな</div>
      <div class="card" onclick="selectMood('ヘビーな',this)">ヘビーな</div>
    </div>
  </div>

  <!-- Relationship -->
  <div class="section">
    <div class="section-title">扱われる距離感の好みは？</div>
    <div class="grid" id="relGrid">
      <div class="card" onclick="selectRel('恋愛',this)">恋愛</div>
      <div class="card" onclick="selectRel('片思い',this)">片思い</div>
      <div class="card" onclick="selectRel('友愛',this)">友愛</div>
      <div class="card" onclick="selectRel('姉妹',this)">姉妹</div>
      <div class="card" onclick="selectRel('疑似家族',this)">疑似家族</div>
      <div class="card" onclick="selectRel('ライバル',this)">ライバル</div>
      <div class="card" onclick="selectRel('罪の共有',this)">罪の共有</div>
      <div class="card" onclick="selectRel('復讐',this)">復讐</div>
      <div class="card" onclick="selectRel('主従',this)">主従</div>
    </div>
  </div>

  <!-- Format -->
  <div class="section">
    <div class="section-title">なにで物語を楽しむ？</div>
    <div class="grid" id="formatGrid">
      <div class="card" onclick="selectFormat('映画',this)">映画</div>
      <div class="card" onclick="selectFormat('ドラマ',this)">ドラマ</div>
      <div class="card" onclick="selectFormat('アニメ',this)">アニメ</div>
      <div class="card" onclick="selectFormat('漫画',this)">漫画</div>
      <div class="card" onclick="selectFormat('小説',this)">小説</div>
    </div>
  </div>

  <div class="section">
    <div class="results-head">
      <div class="section-title" style="margin-bottom:0">たまりばの作品たち</div>
      <div class="tags" id="activeTags"></div>
    </div>
    <div class="results" id="results"></div>
  </div>
</div>

<script>
const url = "https://opensheet.elk.sh/1Q-FkmH9rDdKHDlqSwtX1ILOpWOdVRygT0HrTJyQjBGU/百合作品リスト";
let movies = [];
let searchTimeoutId = null;

const savedState = localStorage.getItem('yuri_tamariba_state');
let state = savedState ? JSON.parse(savedState) : { country: "", mood: [], rel: [], format: [] };

function saveState() { localStorage.setItem('yuri_tamariba_state', JSON.stringify(state)); }

fetch(url).then(r => r.json()).then(d => {
  movies = d;
  render();
  restoreActiveClasses(); 
}).catch(() => {
  document.getElementById("results").innerHTML = `<div class="empty-state">作品たちが流れ着くのを待っています...</div>`;
});

function escapeHtml(str){ return String(str ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;"); }
function openDetail(title){ window.location.href = `detail.html?title=${encodeURIComponent(title)}`; }

function getFilteredMovies(){
  return movies.filter(m=>{
    const okC = !state.country || m.Country === state.country;
    const okM = state.mood.length === 0 || state.mood.some(v => (m.Mood || "").includes(v));
    const okR = state.rel.length === 0 || state.rel.some(v => (m.Relationship || "").includes(v));
    const okF = state.format.length === 0 || state.format.some(v => (m.Format || "").includes(v));
    return okC && okM && okR && okF;
  });
}

function restoreActiveClasses() {
  document.querySelectorAll('.card').forEach(card => {
    const text = card.innerText.trim();
    if (state.country === text || state.mood.includes(text) || state.rel.includes(text) || state.format.includes(text)) {
      card.classList.add('active');
    }
  });
}

function toggleMenu(){ document.getElementById("menu").classList.toggle("open"); document.getElementById("overlay").classList.toggle("show"); }
function closeMenu(){ document.getElementById("menu").classList.remove("open"); document.getElementById("overlay").classList.remove("show"); }

// 検索機能：ヒットしない時のメッセージを含む
function searchMovie(keyword){
  const area = document.getElementById("searchResults");
  clearTimeout(searchTimeoutId);
  if(keyword.trim() === ""){ area.innerHTML = ""; return; }
  
  const filtered = movies.filter(m => (m.Title || "").toLowerCase().includes(keyword.toLowerCase()));
  
  if(filtered.length === 0){
    searchTimeoutId = setTimeout(() => {
      area.innerHTML = `
        <div class="no-result-box">
          その作品は、まだたまりばに届いていないようです。<br>
          <a href="https://docs.google.com/forms/d/e/1FAIpQLSdX4mou3VF1YV12yk7pMq7JWqekHbHNuhw7ufK0gxOhdJxo4Q/viewform?usp=publish-editor" target="_blank" class="form-link">よければ、ここから耳打ちしてください。</a>
        </div>`;
    }, 300);
    return;
  }

  area.innerHTML = filtered.map(m => `
    <div style="display:flex; gap:12px; padding:12px 0; border-bottom:1px solid #f0f8fa; cursor:pointer;" onclick="openDetail('${escapeHtml(m.Title)}')">
      <div style="width:40px; height:54px; border-radius:4px; overflow:hidden; background:#f0f8fa;">
        <img src="${m.Image || ''}" style="width:100%; height:100%; object-fit:cover;" onerror="this.style.display='none'">
      </div>
      <div>
        <div style="font-size:10px; color:#8b8175;">${escapeHtml(m.Country)}</div>
        <div style="font-size:14px; color:#3a5a6a;">${escapeHtml(m.Title)}</div>
      </div>
    </div>`).join("");
}

function selectCountry(val, el){
  if(state.country === val) state.country = "";
  else state.country = val;
  document.querySelectorAll("#countryGrid .card").forEach(c => c.classList.remove("active"));
  if(state.country) el.classList.add("active");
  render();
}

function toggle(type, val, el){
  if(state[type].includes(val)) state[type] = state[type].filter(x => x !== val);
  else state[type].push(val);
  el.classList.toggle("active");
  render();
}
function selectMood(v, el){ toggle('mood', v, el); }
function selectRel(v, el){ toggle('rel', v, el); }
function selectFormat(v, el){ toggle('format', v, el); }

function render(){
  saveState();
  const tags = [state.country, ...state.mood, ...state.rel, ...state.format].filter(Boolean);
  document.getElementById("activeTags").innerHTML = tags.length ? tags.map(t => `<span class="tag">#${escapeHtml(t)}</span>`).join("") : `<span class="tag" style="opacity:0.5">#すべて</span>`;

  const list = getFilteredMovies();
  const area = document.getElementById("results");
  
  area.innerHTML = list.length === 0 ? `<div class="empty-state">まだ、ぴたりと重なる作品は届いていないようです。選択を少し変えてみると、思わぬ掘り出し物があるかもしれません。</div>` : 
  list.map(m => `
    <div class="movie" onclick="openDetail('${escapeHtml(m.Title)}')">
      <div class="movie-img"><img src="${m.Image || ''}" onerror="this.style.display='none'" loading="lazy"></div>
      <div class="movie-content">
        <div class="meta">${escapeHtml(m.Country)} / ${escapeHtml(m.Year)} / ${escapeHtml(m.Format)}</div>
        <h3>${escapeHtml(m.Title)}</h3>
      </div>
    </div>`).join("");
}

function recommendToday(){
  const filtered = getFilteredMovies();
  const pool = filtered.length > 0 ? filtered : movies;
  const picked = pool[Math.floor(Math.random() * pool.length)];
  if(picked) openDetail(picked.Title);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>作品一覧 | 百合のたまりば</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500&display=swap');

*{ box-sizing:border-box; }

body{
  margin:0;
  background: #e0f2f7; 
  color:#2b2b2b;
  font-family: "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 16px;
  overflow-x: hidden;
  line-height: 1.8;
  min-height: 100vh;
}

/* 背景装飾 */
.bg-decor {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: -1; pointer-events: none;
}
.bg-circle {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 0%, transparent 70%);
  filter: blur(50px);
}

/* ===== TOPBAR ===== */
.topbar{
  position:fixed; top:0; left:0; width:100%;
  display:flex; align-items:center;
  padding:20px 30px; background:rgba(255, 255, 255, 0.3);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255, 255, 255, 0.2); z-index:1000;
}
.back-btn {
  text-decoration: none; color: #4a6a7a; font-size: 14px; letter-spacing: 0.1em;
  display: flex; align-items: center; transition: 0.3s;
}
.back-btn:hover { opacity: 0.6; transform: translateX(-5px); }

/* ===== LAYOUT ===== */
.container{ max-width:800px; margin:auto; padding:120px 24px 80px; }
.page-title { font-size: 24px; font-weight: 300; text-align: center; color: #4a6a7a; letter-spacing: 0.2em; margin-bottom: 40px; }
#counter { text-align: center; font-size: 13px; color: #5a7a8a; margin-bottom: 40px; letter-spacing: 0.1em; }

/* ===== COUNTRY BLOCK ===== */
.country-section { margin-bottom: 50px; animation: fadeInUp 1.5s ease backwards; }
.country-title {
  font-size: 18px; font-weight: 500; color: #3a5a6a; margin-bottom: 15px; padding-bottom: 5px;
  border-bottom: 1px dashed rgba(74, 106, 122, 0.3); letter-spacing: 0.1em;
}

/* ===== LIST ===== */
.results{ display:grid; gap:18px; }
.movie{
  background: rgba(255, 255, 255, 0.45); border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 20px; padding:20px; display: flex; gap: 20px; align-items: center;
  transition: all 0.4s; text-decoration: none; color: inherit;
  backdrop-filter: blur(10px);
}
.movie:hover { transform: translateY(-3px); background: rgba(255, 255, 255, 0.6); box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
.movie-img{ width: 75px; height: 105px; flex-shrink: 0; border-radius: 10px; overflow: hidden; background: #f0f8fa; }
.movie-img img{ width: 100%; height: 100%; object-fit: cover; }
.movie-content h3 { margin: 6px 0 0; font-size: 18px; font-weight: 500; color: #3a5a6a; line-height: 1.4; }
.movie-meta { font-size: 12px; color: #5a7a8a; opacity: 0.7; }

#loading { text-align: center; padding: 100px; font-size: 14px; color: #4a6a7a; letter-spacing: 0.2em; }

@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

<body>

<div class="bg-decor">
  <div class="bg-circle" style="width: 60vw; height: 60vw; top: -20vw; right: -10vw;"></div>
  <div class="bg-circle" style="width: 40vw; height: 40vw; bottom: -10vw; left: -10vw; opacity: 0.6;"></div>
</div>

<div class="topbar">
  <a href="index.html" class="back-btn">← たまりばへ戻る</a>
</div>

<div class="container">
  <h1 class="page-title">作品一覧</h1>
  <div id="counter"></div>
  <div id="contentArea">
    <div id="loading">たまりばの記録を開いています...</div>
  </div>
</div>

<script>
const url = "https://opensheet.elk.sh/1Q-FkmH9rDdKHDlqSwtX1ILOpWOdVRygT0HrTJyQjBGU/百合作品リスト";

// ホームでの背景色を引き継ぐ
const savedState = JSON.parse(localStorage.getItem('yuri_state'));
if (savedState && savedState.depth) {
  const val = savedState.depth;
  const r = 224 - (val - 1) * 12;
  const g = 242 - (val - 1) * 15;
  const b = 247 - (val - 1) * 10;
  document.body.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
}

fetch(url)
  .then(r => r.json())
  .then(data => {
    if (data && data.length > 0) {
      renderCountryGroupList(data);
    } else {
      document.getElementById('contentArea').innerHTML = '<div id="loading">登録されている作品がありません。</div>';
    }
  })
  .catch(e => {
    document.getElementById('contentArea').innerHTML = '<div id="loading">データの読み込みに失敗しました。</div>';
  });

function renderCountryGroupList(data) {
  document.getElementById('counter').innerText = `全 ${data.length} 作品`;
  const area = document.getElementById('contentArea');
  
  // 1. トップページの並び順（日本、韓国、タイ…）の配列を用意
  const countryOrder = ["日本", "韓国", "タイ", "台湾", "中国", "アメリカ", "フランス", "イタリア"];
  
  // 2. 国ごとにデータを仕分ける（スプレッドシートに未知の国があれば後ろに回す）
  const groups = {};
  data.forEach(m => {
    const country = m.Country || "その他";
    if (!groups[country]) groups[country] = [];
    groups[country].push(m);
  });

  // 3. 表示する国の順番を決定
  const sortedCountries = Object.keys(groups).sort((a, b) => {
    let idxA = countryOrder.indexOf(a);
    let idxB = countryOrder.indexOf(b);
    if (idxA === -1) idxA = 999;
    if (idxB === -1) idxB = 999;
    return idxA - idxB;
  });

  // 4. HTMLの組み立て
  let html = "";
  
  sortedCountries.forEach(country => {
    const list = groups[country];
    
    // 各国内でタイトル50音順（辞書順）にソート
    list.sort((a, b) => (a.Title || "").localeCompare(b.Title || "", 'ja'));
    
    html += `
      <div class="country-section">
        <h2 class="country-title">${country} (${list.length})</h2>
        <div class="results">
          ${list.map(m => `
            <a class="movie" href="detail.html?title=${encodeURIComponent(m.Title)}">
              <div class="movie-img">
                <img src="${m.Image || ''}" onerror="this.style.opacity='0'">
              </div>
              <div class="movie-content">
                <div class="movie-meta">${m.Format || '---'}</div>
                <h3>${m.Title}</h3>
              </div>
            </a>
          `).join("")}
        </div>
      </div>
    `;
  });
  
  area.innerHTML = html;
}
</script>

</body>
</html>
